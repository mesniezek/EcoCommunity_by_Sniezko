name: Weekly Activity Report

on:
  schedule:
    - cron: '0 6 * * 0' # W każdą niedzielę o 06:00
  workflow_dispatch:   # To pozwoli nam uruchomić raport RĘCZNIE teraz

permissions:
  contents: read
  issues: write        # KLUCZOWE: bot musi mieć prawo do tworzenia Issue

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: wow-actions/activity-report@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Opcjonalnie możesz dodać:
          # days: 30 (żeby sprawdził ostatni miesiąc)
